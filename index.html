<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Slap Trump — Online Frustration Release Game | Free to Play</title>
    <meta name="description" content="Slap Trump online for free! Choose your weapon — hand, chappal, boxing glove, hammer or broom. Watch him go from smiling to crying to begging. The ultimate stress relief game.">
    <meta name="keywords" content="slap trump, slap trump game, trump slap game, slap donald trump, stress relief game, frustration release, hit trump game, trump punching game, funny trump game">
    <meta name="author" content="Slap Trump">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (Facebook, WhatsApp, etc.) -->
    <meta property="og:title" content="Slap Trump — Frustration Release Game">
    <meta property="og:description" content="Choose your weapon and slap Trump! Watch him go from smiling to crying to begging for mercy. Free online stress relief.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="trump-angry.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Slap Trump — Frustration Release Game">
    <meta name="twitter:description" content="Choose your weapon and slap Trump! Watch him cry and beg for mercy. Free online stress relief game.">
    <meta name="twitter:image" content="trump-angry.png">

    <!-- Theme -->
    <meta name="theme-color" content="#0a0a14">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app" id="app">
        <!-- Header -->
        <header class="header" id="header">
            <h1 class="header-title">SLAP <span class="highlight">TRUMP</span></h1>
            <p class="tagline">Frustrated by world events? Take it out here. No consequences. Just satisfaction.</p>
        </header>

        <div class="game-container" id="gameContainer">
            <!-- Equipment Panel -->
            <aside class="equipment-panel" id="equipmentPanel">
                <h2 class="panel-title">⚔️ ARSENAL</h2>
                <div class="equipment-list" id="equipmentList">
                    <button class="equip-btn active" data-equip="hand" id="equip-hand">
                        <span class="equip-icon">✋</span>
                        <span class="equip-name">HAND</span>
                        <span class="equip-desc">Quick slap</span>
                        <span class="equip-dmg">15 DMG</span>
                    </button>
                    <button class="equip-btn" data-equip="chappal" id="equip-chappal">
                        <span class="equip-icon">🩴</span>
                        <span class="equip-name">CHAPPAL</span>
                        <span class="equip-desc">Stinging slap</span>
                        <span class="equip-dmg">25 DMG</span>
                    </button>
                    <button class="equip-btn" data-equip="boxing" id="equip-boxing">
                        <span class="equip-icon">🥊</span>
                        <span class="equip-name">BOXING</span>
                        <span class="equip-desc">Heavy punch</span>
                        <span class="equip-dmg">40 DMG</span>
                    </button>
                    <button class="equip-btn" data-equip="hammer" id="equip-hammer">
                        <span class="equip-icon">🔨</span>
                        <span class="equip-name">HAMMER</span>
                        <span class="equip-desc">BRUTAL hit</span>
                        <span class="equip-dmg">60 DMG</span>
                    </button>
                    <button class="equip-btn" data-equip="broom" id="equip-broom">
                        <span class="equip-icon">🧹</span>
                        <span class="equip-name">JHAADU</span>
                        <span class="equip-desc">Sweep attack</span>
                        <span class="equip-dmg">30 DMG</span>
                    </button>
                </div>
            </aside>

            <!-- Main Arena -->
            <main class="arena" id="arena">
                <div class="canvas-container" id="canvasContainer">
                    <canvas id="faceCanvas"></canvas>
                </div>

                <!-- Speech bubble -->
                <div class="speech-bubble" id="speechBubble"></div>

                <!-- Flying equipment -->
                <div class="equipment-fly" id="equipmentFly"></div>

                <!-- Milestone celebration text -->
                <div class="milestone-display" id="milestoneDisplay"></div>

                <!-- Reset -->
                <button class="reset-btn" id="resetBtn">🔄 RESET</button>
            </main>
        </div>
    </div>

    <!-- Hand cursor (follows mouse) -->
    <div class="hand-cursor" id="handCursor"></div>

    <!-- Screen flash overlay -->
    <div class="screen-flash" id="screenFlash"></div>

    <script src="script.js"></script>
</body>
</html>
